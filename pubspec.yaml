name: amily
description: "Ami-ly : mise en relation Parents / Assistantes Maternelles."
publish_to: 'none'

version: 1.0.0+17

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Firebase (Auth / Firestore / Storage) ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  # --- State management & routing ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # --- Monétisation ---
  purchases_flutter: ^8.1.0            # RevenueCat - Abonnement Ami-ly Pro (Ass Mats)
  flutter_stripe: ^11.1.0              # Stripe - Paiements ponctuels / factures

  # --- Clean architecture helpers ---
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # --- Utilitaires courants ---
  intl: ^0.20.0
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  permission_handler: ^11.3.1
  geolocator: ^13.0.1
  url_launcher: ^6.3.1
  agora_rtc_engine: ^6.5.3
  google_fonts: ^6.2.1

  # --- UI helpers ---
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  http: ^1.6.0
  pdf: ^3.12.0
  webview_flutter: ^4.10.0
  cloud_functions: ^5.6.2
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # --- Code generation ---
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

  # --- Lints Riverpod ---
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

  # --- Icône de l'application ---
  flutter_launcher_icons: ^0.14.3
  change_app_package_name: ^1.5.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
