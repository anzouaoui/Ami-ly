name: amily
description: "Ami-ly : mise en relation Parents / Assistantes Maternelles."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Firebase (Auth / Firestore / Storage) ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # --- State management & routing ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # --- Monétisation ---
  purchases_flutter: ^8.1.0            # RevenueCat - Abonnement Ami-ly Pro (Ass Mats)
  flutter_stripe: ^11.1.0              # Stripe - Paiements ponctuels / factures

  # --- Clean architecture helpers ---
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # --- Utilitaires courants ---
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  permission_handler: ^11.3.1
  geolocator: ^13.0.1
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1

  # --- UI helpers ---
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # --- Code generation ---
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

  # --- Lints Riverpod ---
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  # Décommente et ajoute tes assets quand ils existeront
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/lottie/
