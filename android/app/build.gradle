plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// --- CONFIGURATION DE DÉTECTION ET SÉCURITÉ DU KEYSTORE ---
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties') // Cherche dans android/

// Si pas trouvé dans android/, cherche dans android/app/
if (!keystorePropertiesFile.exists()) {
    keystorePropertiesFile = project.file('key.properties')
}

if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    println "✅ CONFIG SIGNATURE : Le fichier 'key.properties' a été trouvé et chargé avec succès !"
} else {
    println "❌ ERREUR CRITIQUE : Le fichier 'key.properties' est INTROUVABLE."
    println "👉 Crée-le ici : C:\\dev\\Ami-ly\\android\\key.properties"
}
// -----------------------------------------------------------

android {
    namespace "com.app.amily"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.app.amily"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            // Vérification de sécurité pour éviter le NullPointerException
            if (keystoreProperties['storeFile'] != null) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            } else {
                println "❌ ERREUR CRITIQUE : Les variables internes de 'key.properties' (storeFile, passwords...) sont vides ou introuvables !"
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release

            // Optionnel : Optimise le code et réduit la taille (ProGuard/R8)
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
}